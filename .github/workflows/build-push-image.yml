# Reusable build + push workflow for EBC/GPS hosting-platform source repos.
#
# A built workload's CI calls this to build its image and push it to ITS Image
# Repository, keylessly via Workload Identity Federation — no service-account keys.
# The push principal is the calling repo's own GitHub OIDC identity, which holds
# artifactregistry.writer on its own AR repo only (e.g. gps-owner-repo), so it
# cannot touch any other workload's images.
#
# This repo is PUBLIC so any repo in ANY GitHub org can `uses:` it — that is the
# whole point (a private repo's reusable workflow is not callable cross-org). The
# decision and its security rationale live in the platform repo's
# docs/adr/0010-reusable-build-workflow-in-public-repo.md.
#
# Usage (in your source repo, .github/workflows/build-push.yml):
#
#   on:
#     push: { branches: [main] }
#   jobs:
#     image:
#       uses: elastic/ebc-hosting-actions/.github/workflows/build-push-image.yml@v1
#       permissions: { contents: read, id-token: write }
#       with: { ar_repo: <tenant>-<owner>-<repo>, image: <image> }
#
# The platform must have onboarded your repo first (a manifest.yaml with
# `repo: <owner>/<repo>` merged to main), which creates your Image Repository and
# grants your repo push access to it (and only it).
name: build-push-image

on:
  workflow_call:
    inputs:
      ar_repo:
        description: "Image Repository id (e.g. gps-jrphifer-video-search)."
        required: true
        type: string
      image:
        description: "Image name inside the AR repo (e.g. video-search)."
        required: true
        type: string
      context:
        description: "Docker build context."
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Path to the Dockerfile."
        required: false
        default: "Dockerfile"
        type: string
      region:
        description: "Artifact Registry region."
        required: false
        default: "us-west1"
        type: string
      project:
        description: "GCP project."
        required: false
        default: "elastic-ce-tools"
        type: string
      wif_provider:
        description: "Full Workload Identity provider resource name."
        required: false
        default: "projects/14485593664/locations/global/workloadIdentityPools/github-demos/providers/github"
        type: string

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required to mint the GitHub OIDC token for WIF
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          # Direct WIF — no service_account: the federated identity itself holds
          # artifactregistry.writer on this repo's AR repo.
          workload_identity_provider: ${{ inputs.wif_provider }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        env:
          REGION: ${{ inputs.region }}
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push
        env:
          IMAGE_BASE: ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project }}/${{ inputs.ar_repo }}/${{ inputs.image }}
          SHA: ${{ github.sha }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          CONTEXT: ${{ inputs.context }}
        run: |
          docker buildx build \
            --tag "${IMAGE_BASE}:${SHA}" \
            --tag "${IMAGE_BASE}:latest" \
            --file "${DOCKERFILE}" \
            --push \
            "${CONTEXT}"
